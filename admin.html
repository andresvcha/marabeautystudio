<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Mara Beauty Studio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <header class="login-header">
            <h2><a href="index.html" class="header-link">ADMINISTRADOR</a></h2>
            <h1>¡BIENVENIDO!</h1>
            <p>Inicia sesión con tu nombre de usuario y contraseña</p>
        </header>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-login">Iniciar sesión</button>
            <div id="login-error" class="alert alert-error hidden">Usuario o contraseña incorrectos.</div>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
